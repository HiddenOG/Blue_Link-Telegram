<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Report Business</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --secondary-bg: #f5f5f5;
            --border-color: #dddddd;
            --button-color: #000000;
            --button-text: #ffffff;
            --hint-color: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 4px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .biz-preview {
            background: var(--secondary-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .biz-name {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .biz-id {
            font-size: 0.8rem;
            color: var(--hint-color);
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            margin-bottom: 24px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--text-color);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--button-color);
            color: var(--button-text);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .submit-btn:active {
            opacity: 0.8;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .success-view {
            text-align: center;
            padding: 60px 20px;
            display: none;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* Telegram theme integration */
        body.tg-dark {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --secondary-bg: #2a2a2a;
            --border-color: #444444;
            --button-color: #ffffff;
            --button-text: #000000;
            --hint-color: #aaaaaa;
        }
    </style>
</head>

<body>
    <div id="form-view">
        <div class="header">
            <button class="back-btn" onclick="handleBack()">←</button>
            <h1>Report Case</h1>
        </div>

        <div class="biz-preview">
            <div class="biz-name" id="display-name">Loading business...</div>
            <div class="biz-id" id="display-id">ID: --</div>
        </div>

        <label for="reason">Describe the reason for reporting</label>
        <textarea id="reason" placeholder="Please provide details about the scam or issue..."></textarea>

        <button class="submit-btn" id="submit-btn" onclick="submitReport()">Submit Report</button>
    </div>

    <div id="success-view" class="success-view">
        <div class="success-icon">✅</div>
        <h2>Report Sent</h2>
        <p style="margin-top: 12px; color: var(--hint-color);">The admin has been notified and will investigate this
            case.</p>
        <button class="submit-btn" style="margin-top: 32px;" onclick="handleBack()">Back to Business</button>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.expand();
        WebApp.ready();

        // Apply dark theme if needed
        if (WebApp.colorScheme === 'dark') {
            document.body.classList.add('tg-dark');
        }

        // Native Back Button
        WebApp.BackButton.show();
        WebApp.onEvent('backButtonClicked', handleBack);

        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const businessId = params.get('id');
        const customerId = params.get('uid');
        const serviceContext = params.get('service');
        const locationContext = params.get('location');

        // Initial Data Fetch/Display
        let businessName = "Unknown Business";

        async function init() {
            if (!businessId) {
                WebApp.showAlert('Missing business ID');
                return;
            }

            try {
                const resp = await fetch(`/api/business/${businessId}`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    businessName = data.business_name;
                    document.getElementById('display-name').textContent = businessName;
                    document.getElementById('display-id').textContent = `ID: ${businessId}`;
                }
            } catch (err) {
                console.error(err);
            }
        }

        function handleBack() {
            // Include all params to keep the hierarchy
            let url = `business.html?id=${businessId}&uid=${customerId || ''}`;
            if (serviceContext) url += `&service=${encodeURIComponent(serviceContext)}`;
            if (locationContext) url += `&location=${encodeURIComponent(locationContext)}`;
            window.location.href = url;
        }

        async function submitReport() {
            const reason = document.getElementById('reason').value.trim();
            if (!reason) {
                WebApp.showAlert('Please describe the reason for reporting.');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const resp = await fetch('/api/business/report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify({
                        business_id: businessId,
                        reporter_id: customerId || (WebApp.initDataUnsafe.user ? WebApp.initDataUnsafe.user.id : null),
                        reason: reason
                    })
                });

                if (resp.ok) {
                    document.getElementById('form-view').style.display = 'none';
                    document.getElementById('success-view').style.display = 'block';
                    WebApp.HapticFeedback.notificationOccurred('success');
                } else {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Submission failed');
                }
            } catch (err) {
                WebApp.showAlert('Error: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Submit Report';
            }
        }

        init();
    </script>
</body>

</html>
