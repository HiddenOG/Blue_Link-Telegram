<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Register Business</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Specific overrides for register page if any */
        body {
            padding-bottom: 40px;
        }
    </style>
</head>

<body>
    <div id="loader" class="loader-container hidden">
        <div class="spinner"></div>
        <p>Submitting registration...</p>
    </div>

    <div id="app">
        <header>
            <h1>Register Business</h1>
        </header>

        <form id="register-form" class="card">
            <div class="form-group">
                <label for="reg-name">Your Full Name</label>
                <input type="text" id="reg-name" name="full_name" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label for="reg-business">Business Name</label>
                <input type="text" id="reg-business" name="business_name" placeholder="e.g. John's Plumbing" required>
            </div>

            <div class="form-group">
                <label for="reg-service">Service Offered</label>
                <input type="text" id="reg-service" name="business_services" placeholder="e.g. Plumbing, Catering"
                    required>
            </div>

            <div class="form-group">
                <label for="reg-location">Location (City/State)</label>
                <input type="text" id="reg-location" name="business_location" placeholder="e.g. Ikeja, Lagos" required>
            </div>

            <div class="form-group">
                <label for="reg-phone">Phone Number (WhatsApp)</label>
                <input type="tel" id="reg-phone" name="phone_number" placeholder="e.g. 08012345678" required
                    pattern="\d{11}">
            </div>

            <div class="form-group">
                <label for="reg-desc">Description</label>
                <textarea id="reg-desc" name="business_description" rows="3" placeholder="Describe your services..."
                    required></textarea>
            </div>

            <div class="form-group">
                <label>Business Photos (Max 3)</label>
                <div class="file-upload-container">
                    <label class="file-upload-btn">
                        📷 Tap to Upload Photos
                        <input type="file" id="photo-input" class="hidden-input" accept="image/*" multiple max="3">
                    </label>
                    <div id="preview-area" class="preview-container"></div>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="premium-button">🚀 Submit Registration</button>
        </form>
    </div>

    <div id="success-view" class="hidden" style="text-align: center; padding: 80px 24px;">
        <div style="font-size: 80px; margin-bottom: 30px; filter: drop-shadow(4px 4px 0px #000);">✅</div>
        <h2 style="font-weight: 900; text-transform: uppercase; color: var(--primary); margin-bottom: 12px;">
            Registration Sent!</h2>
        <p style="color: var(--text-color); font-weight: 700; margin-bottom: 40px;">
            Your business has been sent for admin approval.<br>
            You will be notified via the bot soon.
        </p>
        <button onclick="Telegram.WebApp.close()" class="premium-button secondary">Close</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Manual hash parsing fallback
        function getInitData() {
            if (tg.initData) return tg.initData;

            // Try Regex on the whole URL (hash or search)
            const match = window.location.href.match(/[\?#&]tgWebAppData=([^&]+)/);
            if (match) {
                return decodeURIComponent(match[1]);
            }
            return "";
        }

        const initDataRaw = getInitData();



        if (!initDataRaw) {
            console.warn("⚠️ No initData found. Using URL fallback if available.");
            // We allow proceeding so the form can key off 'uid' param
        }

        // Theme integration
        document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1a1a1a');
        document.documentElement.style.setProperty('--tg-theme-text-color', tg.themeParams.text_color || '#ffffff');
        document.documentElement.style.setProperty('--tg-theme-button-color', tg.themeParams.button_color || '#248bcf');
        document.documentElement.style.setProperty('--tg-theme-button-text-color', tg.themeParams.button_text_color || '#ffffff');

        const photoInput = document.getElementById('photo-input');
        const previewArea = document.getElementById('preview-area');
        let selectedFiles = [];

        // Haptic feedback
        const haptic = tg.HapticFeedback;

        photoInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length + selectedFiles.length > 3) {
                tg.showAlert("You can only upload up to 3 photos.");
                return;
            }

            files.forEach(file => {
                if (selectedFiles.length >= 3) return;
                selectedFiles.push(file);

                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    previewArea.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
            haptic.selectionChanged();
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();


            haptic.impactOccurred('light');

            const submitBtn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader');
            const formContainer = document.getElementById('app');
            const successView = document.getElementById('success-view');

            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            // Show loader
            loader.classList.remove('hidden');
            formContainer.style.opacity = '0.5';

            const formData = new FormData();
            formData.append('initData', initDataRaw); // Use our manual fetch

            // Fallback: send user_id from URL param or initDataUnsafe
            const urlParams = new URLSearchParams(window.location.search);
            const uidFromUrl = urlParams.get('uid');
            const uidFromTg = tg.initDataUnsafe?.user?.id;
            const fallbackUid = uidFromUrl || uidFromTg || '';
            if (fallbackUid) {
                formData.append('user_id', fallbackUid);
            }

            // Append text fields
            const formElements = e.target.elements;
            formData.append('full_name', formElements.full_name.value);
            formData.append('business_name', formElements.business_name.value);
            formData.append('business_services', formElements.business_services.value);
            formData.append('business_location', formElements.business_location.value);
            formData.append('phone_number', formElements.phone_number.value);
            formData.append('business_description', formElements.business_description.value);

            // Append photos
            selectedFiles.forEach((file, index) => {
                formData.append('photos', file);
            });

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    haptic.notificationOccurred('success');
                    loader.classList.add('hidden');
                    formContainer.classList.add('hidden');
                    successView.classList.remove('hidden');
                } else {
                    let apiError = 'Registration failed';
                    if (result.detail) {
                        if (typeof result.detail === 'string') {
                            apiError = result.detail;
                        } else if (Array.isArray(result.detail)) {
                            // Extract first validation error
                            const firstErr = result.detail[0];
                            apiError = `${firstErr.loc.join('.')} - ${firstErr.msg}`;
                        } else {
                            apiError = JSON.stringify(result.detail);
                        }
                    }
                    throw new Error(apiError);
                }
            } catch (error) {
                haptic.notificationOccurred('error');
                tg.showAlert(`Error: ${error.message}`);
                loader.classList.add('hidden');
                formContainer.style.opacity = '1';
                submitBtn.disabled = false;
                submitBtn.innerText = "🚀 Submit Registration";
            }
        });
    </script>
</body>

</html>
